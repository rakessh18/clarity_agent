<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarity AI Agent | Product Intelligence</title>
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel CDN for JSX support in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Premium Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080a0d;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent: #06d6a0;
            --accent-gradient: linear-gradient(135deg, #06d6a0, #118ab2);
            --text-main: #e0e0e0;
            --text-dim: #888;
            --text-muted: #444;
            --font-main: 'DM Sans', sans-serif;
            --font-display: 'Syne', sans-serif;
            --font-mono: 'DM Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .premium-btn {
            background: var(--accent-gradient);
            color: #000;
            font-weight: 700;
            font-family: var(--font-display);
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .premium-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.1);
            box-shadow: 0 0 20px rgba(6, 214, 160, 0.2);
        }

        .premium-btn:active { transform: translateY(0); }
        .premium-btn:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; transform: none; }

        .secondary-btn {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            font-weight: 600;
            font-family: var(--font-main);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }

        .secondary-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: white;
            padding: 12px 16px;
            font-family: var(--font-mono);
            font-size: 14px;
            transition: all 0.2s;
            width: 100%;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--accent);
            background: rgba(6, 214, 160, 0.03);
            box-shadow: 0 0 0 1px var(--accent);
        }

        .data-table-container {
            overflow-x: auto;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            border: 1px solid var(--card-border);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            font-family: var(--font-mono);
        }

        .data-table th {
            padding: 12px 16px;
            text-align: left;
            color: var(--text-muted);
            border-bottom: 1px solid var(--card-border);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .data-table td {
            padding: 10px 16px;
            color: var(--text-dim);
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .data-table tr:hover td {
            background: rgba(255, 255, 255, 0.01);
            color: var(--text-main);
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const CLAUDE_MODEL = "claude-3-5-sonnet-20241022";

        // ── API Logic ────────────────────────────────────────────────────────────────
        async function fetchAIProxy(body) {
            const res = await fetch("/api/analyze", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body),
            });
            const data = await res.json();
            if (!res.ok) {
                const msg = data.error?.message || data.error || data.details || JSON.stringify(data);
                throw new Error(msg);
            }
            return data;
        }

        async function fetchClarityViaProxy(apiToken, numOfDays) {
            const clarityUrl = `https://www.clarity.ms/export-data/api/v1/project-live-insights?numOfDays=${numOfDays}&dimension1=Browser&dimension2=Device&dimension3=OS`;

            try {
                const res = await fetch("/api/analyze", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        action: "fetch",
                        url: clarityUrl,
                        headers: { "Authorization": `Bearer ${apiToken}` }
                    }),
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || "Failed to fetch Clarity data");
                return { data: data, raw: JSON.stringify(data, null, 2), error: null };
            } catch (e) {
                return { data: null, raw: "", error: e.message || String(e) };
            }
        }

        async function analyzeWithClaude(systemPrompt, clarityData, csvData, history = []) {
            const payload = {
                clarityData: clarityData,
                csvSample: csvData?.slice(0, 20) ?? null,
                metricsSummary: extractStats(clarityData)
            };

            const messages = history.length > 0 ? history : [{
                role: "user",
                content: `Analyze this behavioral data and give me the top 5 most important product improvement ideas: ${JSON.stringify(payload)}`,
            }];

            const body = {
                model: CLAUDE_MODEL,
                max_tokens: 1500,
                system: systemPrompt,
                messages: messages,
            };

            try {
                const data = await fetchAIProxy(body);
                return data.content?.map((b) => b.text || "").join("") || "No response.";
            } catch (e) {
                console.error("AI Analysis Error:", e);
                return "Error: " + (e.message || String(e));
            }
        }

        // ── Helpers ──────────────────────────────────────────────────────────────────
        function parseCSV(text) {
            const lines = text.trim().split("\n");
            if (lines.length < 2) return [];
            const headers = lines[0].split(",").map((h) => h.trim().replace(/"/g, ""));
            return lines.slice(1).map((line) => {
                const vals = line.split(",").map((v) => v.trim().replace(/"/g, ""));
                return Object.fromEntries(headers.map((h, i) => [h, vals[i] ?? ""]));
            });
        }

        function extractStats(data) {
            if (!data) return null;
            const rows = Array.isArray(data) ? data : data?.metrics || data?.data || [];
            if (!rows.length) return null;

            let sessions = 0, pageViews = 0, rageClicks = 0, deadClicks = 0, scrollSum = 0, scrollN = 0;
            
            rows.forEach((r) => {
                // Handle different potential field names from Clarity API vs CSV
                const s = parseInt(r.sessions || r.totalSessions || r.sessionsCount || 0);
                const p = parseInt(r.pageViews || r.totalPageViews || 0);
                const rc = parseInt(r.rageClicks || r.rageClickCount || (r.metricName === "RageTapCount" ? r.information?.reduce((a,b)=>a+(parseInt(b.Total||0)),0) : 0) || 0);
                const dc = parseInt(r.deadClicks || r.deadClickCount || (r.metricName === "DeadTapCount" ? r.information?.reduce((a,b)=>a+(parseInt(b.Total||0)),0) : 0) || 0);
                
                sessions += s;
                pageViews += p;
                rageClicks += rc;
                deadClicks += dc;
                
                const sd = parseFloat(r.scrollDepth || r.avgScrollDepth || 0);
                if (sd > 0) { scrollSum += sd; scrollN++; }
            });

            // Fallback for structured "Traffic" metric from Clarity API
            if (sessions === 0 && Array.isArray(data)) {
                const traffic = data.find(r => r.metricName === "Traffic")?.information || [];
                sessions = traffic.reduce((acc, curr) => acc + (parseInt(curr.sessionsCount || curr.totalSessionCount || 0)), 0);
                pageViews = traffic.reduce((acc, curr) => acc + (parseInt(curr.totalPageViews || 0)), 0);
            }

            return { 
                sessions: sessions || 0, 
                pageViews: pageViews || 0, 
                rageClicks: rageClicks || 0, 
                deadClicks: deadClicks || 0, 
                avgScroll: scrollN ? (scrollSum / scrollN).toFixed(1) : null, 
                rows: rows.length 
            };
        }

        const SYSTEM_PROMPT = `You are a senior product analyst AI specializing in mobile UX and college application platforms.
Analyze user behavior data and give sharp, actionable product improvement ideas. Focus on conversion drop-offs and friction points.
Structure each insight as:
1. Key insight (what the data shows)
2. Why it matters
3. Specific recommendation
4. Priority: 🔴 Critical / 🟡 Medium / 🟢 Nice-to-have`;

        // ── UI Components ─────────────────────────────────────────────────────────────
        function Stat({ icon, label, value, sub, color }) {
            return (
                <div className="glass-card" style={{ padding: "20px", flex: 1, borderTop: `3px solid ${color}` }}>
                    <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "12px" }}>
                        <span style={{ fontSize: "20px" }}>{icon}</span>
                        <span style={{ fontSize: "11px", color: "var(--text-muted)", fontFamily: "var(--font-mono)", textTransform: "uppercase", letterSpacing: "0.1em" }}>{label}</span>
                    </div>
                    <div style={{ fontSize: "26px", fontWeight: "800", fontFamily: "var(--font-display)", color: "white" }}>{value}</div>
                    {sub && <div style={{ fontSize: "11px", color: "var(--text-muted)", marginTop: "4px" }}>{sub}</div>}
                </div>
            );
        }

        function InsightCard({ text, i }) {
            const cols = ["#06d6a0", "#118ab2", "#ffd166", "#ef4444", "#a29bfe"];
            return (
                <div className="glass-card" style={{ padding: "20px", marginBottom: "12px", borderLeft: `4px solid ${cols[i % 5]}`, background: "rgba(255,255,255,0.01)" }}>
                    <p style={{ margin: 0, fontSize: "14px", color: "var(--text-main)", lineHeight: "1.8", whiteSpace: "pre-wrap" }}>{text}</p>
                </div>
            );
        }

        function Bubble({ msg }) {
            const u = msg.role === "user";
            return (
                <div style={{ display: "flex", justifyContent: u ? "flex-end" : "flex-start", marginBottom: 16 }}>
                    {!u && <div style={{ width: 28, height: 28, borderRadius: "50%", background: "var(--accent-gradient)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "12px", marginRight: "10px", marginTop: "4px", flexShrink: 0 }}>✦</div>}
                    <div style={{ 
                        maxWidth: "80%", 
                        background: u ? "rgba(6, 214, 160, 0.1)" : "rgba(255, 255, 255, 0.04)", 
                        color: u ? "var(--accent)" : "var(--text-main)",
                        borderRadius: u ? "16px 4px 16px 16px" : "4px 16px 16px 16px", 
                        padding: "12px 18px", 
                        fontSize: "14px", 
                        lineHeight: "1.7",
                        border: u ? "1px solid rgba(6, 214, 160, 0.2)" : "1px solid var(--card-border)"
                    }}>
                        {msg.content}
                    </div>
                </div>
            );
        }

        function StatusBadge({ connected, label, color }) {
            const finalColor = color || (connected ? "#10b981" : "#333");
            return (
                <div style={{ display: "flex", alignItems: "center", gap: "8px", padding: "6px 12px", background: "rgba(255,255,255,0.03)", borderRadius: "20px", border: "1px solid var(--card-border)" }}>
                    <div style={{ width: "8px", height: "8px", borderRadius: "50%", background: finalColor, boxShadow: connected ? `0 0 10px ${finalColor}` : "none" }}></div>
                    <span style={{ fontSize: "11px", fontWeight: "700", color: finalColor, fontFamily: "var(--font-mono)", textTransform: "uppercase" }}>{label}</span>
                </div>
            );
        }

        // ── Main App ──────────────────────────────────────────────────────────────────
        function App() {
            const [tab, setTab] = useState("setup");
            const [token, setToken] = useState("");
            const [days, setDays] = useState(1);
            const [clarityData, setClarityData] = useState(null);
            const [rawResponse, setRawResponse] = useState("");
            const [csv, setCsv] = useState(null);
            const [csvName, setCsvName] = useState("");
            const [loading, setLoading] = useState(false);
            const [loadingMsg, setLoadingMsg] = useState("");
            const [insights, setInsights] = useState([]);
            const [chat, setChat] = useState([]);
            const [chatInput, setChatInput] = useState("");
            const [chatLoading, setChatLoading] = useState(false);
            const [err, setErr] = useState("");
            const fileRef = useRef(null);
            const endRef = useRef(null);

            useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [chat]);

            async function connect() {
                if (!token.trim() && !csv) { setErr("Please enter an API token or upload a CSV."); return; }
                setLoading(true); setErr(""); setInsights([]);
                setLoadingMsg(token.trim() ? "Connecting to Clarity..." : "Processing CSV data...");
                
                try {
                    let dataToAnalyze = null;
                    if (token.trim()) {
                        const cleanToken = token.trim().replace(/^Bearer\s+/i, "");
                        const result = await fetchClarityViaProxy(cleanToken, days);
                        setRawResponse(result.raw || "");
                        if (result.error && !result.data) {
                            setErr(`⚠️ API Error: ${result.error.slice(0, 150)}`);
                        } else {
                            setClarityData(result.data);
                            dataToAnalyze = result.data;
                        }
                    }

                    setLoadingMsg("AI is analyzing behavioral patterns...");
                    const reply = await analyzeWithClaude(SYSTEM_PROMPT, dataToAnalyze || clarityData, csv);
                    const parts = reply.split(/\n(?=\d+\.)/).filter(Boolean);
                    setInsights(parts.length > 1 ? parts : [reply]);
                    setTab("dashboard");
                } catch (e) {
                    setErr(e.message);
                } finally {
                    setLoading(false);
                    setLoadingMsg("");
                }
            }

            function handleFile(e) {
                const f = e.target.files?.[0]; if (!f) return;
                setCsvName(f.name);
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const parsed = parseCSV(ev.target.result);
                    setCsv(parsed);
                };
                reader.readAsText(f);
            }

            const stats = extractStats(clarityData || csv);
            const isConnected = !!clarityData;

            return (
                <div style={{ maxWidth: 1100, margin: "0 auto", padding: "0 20px" }}>
                    {/* Header */}
                    <header style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "40px 0", marginBottom: "20px" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                            <div style={{ width: "32px", height: "32px", borderRadius: "10px", background: "var(--accent-gradient)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "16px", color: "#000" }}>✦</div>
                            <div>
                                <h1 style={{ fontSize: "20px", fontWeight: "800", fontFamily: "var(--font-display)", letterSpacing: "-0.02em" }}>Clarity Agent</h1>
                                <p style={{ fontSize: "10px", color: "var(--text-muted)", fontFamily: "var(--font-mono)", textTransform: "uppercase" }}>/ Intelligence Hub</p>
                            </div>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: "24px" }}>
                            <nav style={{ display: "flex", gap: "4px", background: "rgba(255,255,255,0.03)", padding: "4px", borderRadius: "12px", border: "1px solid var(--card-border)" }}>
                                {["setup", "dashboard", "chat"].map(t => (
                                    <button key={t} onClick={() => setTab(t)} style={{ 
                                        padding: "8px 16px", borderRadius: "8px", border: "none", 
                                        background: tab === t ? "rgba(255,255,255,0.06)" : "transparent",
                                        color: tab === t ? "white" : "var(--text-dim)",
                                        fontSize: "13px", fontWeight: "700", cursor: "pointer", transition: "all 0.2s",
                                        fontFamily: "var(--font-main)"
                                    }}>{t.charAt(0).toUpperCase() + t.slice(1)}</button>
                                ))}
                            </nav>
                            <div style={{ display: "flex", gap: "10px" }}>
                                <StatusBadge connected={isConnected} label={isConnected ? "Live API" : "No API"} />
                                {csv && <StatusBadge connected={true} label="CSV Loaded" color="#ffd166" />}
                            </div>
                        </div>
                    </header>

                    <main style={{ animation: "fadeIn 0.6s ease-out" }}>
                        {/* ── SETUP ── */}
                        {tab === "setup" && (
                            <div style={{ maxWidth: "560px", margin: "0 auto", display: "flex", flexDirection: "column", gap: "24px" }}>
                                <div className="glass-card" style={{ padding: "40px" }}>
                                    <h2 style={{ fontSize: "24px", fontWeight: "800", fontFamily: "var(--font-display)", marginBottom: "8px" }}>Connect Data</h2>
                                    <p style={{ color: "var(--text-dim)", fontSize: "14px", marginBottom: "32px" }}>Sync your Microsoft Clarity instance via API token.</p>
                                    
                                    <div style={{ marginBottom: "24px" }}>
                                        <label style={{ display: "block", fontSize: "11px", fontWeight: "700", color: "var(--text-muted)", marginBottom: "8px", textTransform: "uppercase", letterSpacing: "0.1em" }}>API Token</label>
                                        <input className="input-field" type="password" placeholder="Paste your Clarity token" value={token} onChange={(e) => setToken(e.target.value)} />
                                        <p style={{ marginTop: "8px", fontSize: "11px", color: "var(--text-muted)" }}>Settings → Data Export → Generate new API token</p>
                                    </div>

                                    <div style={{ marginBottom: "32px" }}>
                                        <label style={{ display: "block", fontSize: "11px", fontWeight: "700", color: "var(--text-muted)", marginBottom: "8px", textTransform: "uppercase", letterSpacing: "0.1em" }}>Analysis Window</label>
                                        <div style={{ display: "flex", gap: "10px" }}>
                                            {[1, 2, 3].map(d => (
                                                <button key={d} onClick={() => setDays(d)} style={{ 
                                                    flex: 1, padding: "12px", borderRadius: "10px", border: "1px solid", 
                                                    borderColor: days === d ? "var(--accent)" : "var(--card-border)",
                                                    background: days === d ? "rgba(6, 214, 160, 0.05)" : "transparent",
                                                    color: days === d ? "white" : "var(--text-dim)",
                                                    fontSize: "13px", fontWeight: "700", cursor: "pointer"
                                                }}>{d === 1 ? "24h" : d === 2 ? "48h" : "72h"}</button>
                                            ))}
                                        </div>
                                    </div>

                                    {err && (
                                        <div style={{ padding: "14px", background: "rgba(239, 68, 68, 0.05)", border: "1px solid rgba(239, 68, 68, 0.1)", borderRadius: "10px", marginBottom: "24px", color: "#fca5a5", fontSize: "13px" }}>{err}</div>
                                    )}

                                    <button className="premium-btn" style={{ width: "100%" }} onClick={connect} disabled={loading}>
                                        {loading ? (
                                            <>
                                                <div style={{ width: "14px", height: "14px", border: "2px solid #000", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.8s linear infinite" }}></div>
                                                {loadingMsg}
                                            </>
                                        ) : "Synchronize & Analyze →"}
                                    </button>
                                </div>

                                <div className="glass-card" style={{ padding: "24px" }}>
                                    <div style={{ display: "flex", alignItems: "center", gap: "10px", marginBottom: "12px" }}>
                                        <span style={{ fontSize: "20px" }}>📂</span>
                                        <h3 style={{ fontSize: "16px", fontWeight: "800", fontFamily: "var(--font-display)" }}>Historical CSV</h3>
                                    </div>
                                    <p style={{ color: "var(--text-dim)", fontSize: "13px", marginBottom: "20px", lineHeight: "1.6" }}>Upload a CSV export for longer time ranges (7-90 days). This acts as a primary source if the API is offline.</p>
                                    <input ref={fileRef} type="file" accept=".csv" style={{ display: "none" }} onChange={handleFile} />
                                    <button className="secondary-btn" style={{ width: "100%" }} onClick={() => fileRef.current?.click()}>
                                        {csvName ? `✓ ${csvName}` : "Choose CSV File"}
                                    </button>
                                    {csv && <p style={{ fontSize: "11px", color: "var(--accent)", marginTop: "10px", textAlign: "center", fontFamily: "var(--font-mono)" }}>{csv.length} rows indexed</p>}
                                </div>
                            </div>
                        )}

                        {/* ── DASHBOARD ── */}
                        {tab === "dashboard" && (
                            <div>
                                {(stats) ? (
                                    <div style={{ display: "grid", gridTemplateColumns: "1fr 380px", gap: "40px", alignItems: "start" }}>
                                        <div style={{ display: "flex", flexDirection: "column", gap: "32px" }}>
                                            <section>
                                                <h3 style={{ fontSize: "11px", fontWeight: "700", color: "var(--text-muted)", marginBottom: "16px", textTransform: "uppercase", letterSpacing: "0.1em" }}>Behavioral Pulse</h3>
                                                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: "16px" }}>
                                                    <Stat icon="👥" label="Total Sessions" value={stats.sessions.toLocaleString()} sub="Active interactions" color="#06d6a0" />
                                                    <Stat icon="📄" label="Page Views" value={stats.pageViews.toLocaleString()} sub="Total navigation depth" color="#118ab2" />
                                                    <Stat icon="🔥" label="Rage Clicks" value={stats.rageClicks.toLocaleString()} sub="High-friction signals" color="#ef4444" />
                                                    <Stat icon="🖱️" label="Dead Clicks" value={stats.deadClicks.toLocaleString()} sub="Unresponsive taps" color="#ffd166" />
                                                </div>
                                            </section>

                                            {clarityData && (
                                                <section>
                                                    <h3 style={{ fontSize: "11px", fontWeight: "700", color: "var(--text-muted)", marginBottom: "16px", textTransform: "uppercase", letterSpacing: "0.1em" }}>Live Data Stream</h3>
                                                    <div className="data-table-container">
                                                        <table className="data-table">
                                                            <thead>
                                                                <tr>
                                                                    <th>Metric</th>
                                                                    <th>Sessions</th>
                                                                    <th>Friction</th>
                                                                    <th>Trend</th>
                                                                </tr>
                                                            </thead>
                                                            <tbody>
                                                                {clarityData.slice(0, 5).map((row, i) => (
                                                                    <tr key={i}>
                                                                        <td>{row.metricName || row.Dimension || "Dimension"}</td>
                                                                        <td>{row.sessionsCount || row.TotalSessions || row.sessions || "—"}</td>
                                                                        <td>{row.deadClickCount || row.rageClickCount || "—"}</td>
                                                                        <td><span style={{ color: "#10b981" }}>↑ stable</span></td>
                                                                    </tr>
                                                                ))}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                </section>
                                            )}

                                            <section>
                                                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "16px" }}>
                                                    <h3 style={{ fontSize: "11px", fontWeight: "700", color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.1em" }}>AI Product Insights</h3>
                                                    <button onClick={connect} style={{ fontSize: "11px", background: "transparent", border: "none", color: "var(--accent)", cursor: "pointer", fontWeight: "700" }}>↺ RE-ANALYZE</button>
                                                </div>
                                                {insights.length === 0 ? (
                                                    <div className="glass-card" style={{ padding: "40px", textAlign: "center" }}>
                                                        <div style={{ width: "20px", height: "20px", border: "2px solid var(--accent)", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.8s linear infinite", margin: "0 auto 16px" }}></div>
                                                        <p style={{ color: "var(--text-dim)", fontSize: "13px" }}>Analyzing behavioral data patterns...</p>
                                                    </div>
                                                ) : (
                                                    insights.map((text, i) => <InsightCard key={i} text={text} i={i} />)
                                                )}
                                            </section>
                                        </div>

                                        <aside className="glass-card" style={{ position: "sticky", top: "20px", padding: "24px", height: "calc(100vh - 140px)", display: "flex", flexDirection: "column" }}>
                                            <h3 style={{ fontSize: "11px", fontWeight: "700", color: "var(--text-muted)", marginBottom: "20px", textTransform: "uppercase", letterSpacing: "0.1em" }}>Strategy Consultant</h3>
                                            <div style={{ flex: 1, overflowY: "auto", paddingRight: "8px", marginBottom: "20px" }}>
                                                {chat.length === 0 && (
                                                    <div style={{ textAlign: "center", paddingTop: "40px", color: "var(--text-muted)" }}>
                                                        <div style={{ fontSize: "24px", marginBottom: "12px" }}>◎</div>
                                                        <p style={{ fontSize: "12px" }}>Ask about drop-offs,<br/>funnel friction, or UX ideas.</p>
                                                    </div>
                                                )}
                                                {chat.map((m, i) => <Bubble key={i} msg={m} />)}
                                                {chatLoading && <div style={{ fontSize: "11px", color: "var(--text-muted)", fontFamily: "var(--font-mono)" }}>Thinking...</div>}
                                                <div ref={endRef} />
                                            </div>
                                            <div style={{ position: "relative" }}>
                                                <input className="input-field" placeholder="Ask Claude..." value={chatInput} disabled={chatLoading} onChange={(e) => setChatInput(e.target.value)} onKeyDown={async (e) => {
                                                    if (e.key === "Enter" && chatInput.trim() && !chatLoading) {
                                                        const userMsg = chatInput.trim();
                                                        setChatInput("");
                                                        setChat(prev => [...prev, { role: "user", content: userMsg }]);
                                                        setChatLoading(true);
                                                        const reply = await analyzeWithClaude(SYSTEM_PROMPT, clarityData, csv, [...chat, { role: "user", content: userMsg }]);
                                                        setChat(prev => [...prev, { role: "assistant", content: reply }]);
                                                        setChatLoading(false);
                                                    }
                                                }} />
                                            </div>
                                        </aside>
                                    </div>
                                ) : (
                                    <div className="glass-card" style={{ padding: "80px 40px", textAlign: "center", maxWidth: "600px", margin: "0 auto" }}>
                                        <div style={{ fontSize: "48px", marginBottom: "24px" }}>📡</div>
                                        <h3 style={{ fontSize: "24px", fontWeight: "800", fontFamily: "var(--font-display)", marginBottom: "12px" }}>No Data Context</h3>
                                        <p style={{ color: "var(--text-dim)", fontSize: "14px", marginBottom: "32px", lineHeight: "1.6" }}>Synchronize with the Clarity API or upload a CSV report in the Setup tab to unlock product insights.</p>
                                        <button className="premium-btn" onClick={() => setTab("setup")}>Configure Setup →</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {/* ── CHAT ── */}
                        {tab === "chat" && (
                            <div style={{ maxWidth: "800px", margin: "0 auto" }}>
                                <div className="glass-card" style={{ height: "calc(100vh - 200px)", display: "flex", flexDirection: "column", padding: "32px" }}>
                                    <div style={{ marginBottom: "24px" }}>
                                        <h2 style={{ fontSize: "24px", fontWeight: "800", fontFamily: "var(--font-display)", marginBottom: "8px" }}>Strategy Consultant</h2>
                                        <p style={{ color: "var(--text-dim)", fontSize: "14px" }}>Direct access to the AI agent with full data context.</p>
                                    </div>
                                    
                                    {chat.length === 0 && (
                                        <div style={{ display: "flex", flexWrap: "wrap", gap: "8px", marginBottom: "24px" }}>
                                            {["Where are students dropping off?", "What's causing rage clicks?", "How to improve the search flow?", "Check device friction"].map(q => (
                                                <button key={q} onClick={() => setChatInput(q)} style={{ padding: "8px 16px", borderRadius: "20px", border: "1px solid var(--card-border)", background: "rgba(255,255,255,0.03)", color: "var(--text-dim)", fontSize: "12px", cursor: "pointer", transition: "0.2s" }} onMouseEnter={e => e.target.style.color='white'}>{q}</button>
                                            ))}
                                        </div>
                                    )}

                                    <div style={{ flex: 1, overflowY: "auto", paddingRight: "16px", marginBottom: "24px" }}>
                                        {chat.map((m, i) => <Bubble key={i} msg={m} />)}
                                        {chatLoading && <div style={{ fontSize: "12px", color: "var(--text-muted)", fontFamily: "var(--font-mono)" }}>Thinking...</div>}
                                        <div ref={endRef} />
                                    </div>
                                    
                                    <div style={{ display: "flex", gap: "12px" }}>
                                        <input className="input-field" style={{ padding: "16px 20px", fontSize: "15px", fontFamily: "var(--font-main)" }} placeholder="Type your strategic question..." value={chatInput} disabled={chatLoading} onChange={(e) => setChatInput(e.target.value)} onKeyDown={async (e) => {
                                            if (e.key === "Enter" && chatInput.trim() && !chatLoading) {
                                                const userMsg = chatInput.trim();
                                                setChatInput("");
                                                setChat(prev => [...prev, { role: "user", content: userMsg }]);
                                                setChatLoading(true);
                                                const reply = await analyzeWithClaude(SYSTEM_PROMPT, clarityData, csv, [...chat, { role: "user", content: userMsg }]);
                                                setChat(prev => [...prev, { role: "assistant", content: reply }]);
                                                setChatLoading(false);
                                            }
                                        }} />
                                        <button className="premium-btn" onClick={async () => {
                                             if (chatInput.trim() && !chatLoading) {
                                                const userMsg = chatInput.trim();
                                                setChatInput("");
                                                setChat(prev => [...prev, { role: "user", content: userMsg }]);
                                                setChatLoading(true);
                                                const reply = await analyzeWithClaude(SYSTEM_PROMPT, clarityData, csv, [...chat, { role: "user", content: userMsg }]);
                                                setChat(prev => [...prev, { role: "assistant", content: reply }]);
                                                setChatLoading(false);
                                            }
                                        }}>Send</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
