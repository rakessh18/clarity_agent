<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarity AI Agent | Product Intelligence</title>
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel CDN for JSX support in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.6);
            --card-border: rgba(255, 255, 255, 0.06);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
            --text-muted: #6b7280;
            --font-main: 'Inter', sans-serif;
            --font-display: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: var(--font-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .premium-btn {
            background: var(--accent);
            color: white;
            font-weight: 600;
            font-family: var(--font-display);
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px -2px rgba(99, 102, 241, 0.3);
        }
        .premium-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px -2px rgba(99, 102, 241, 0.4);
            filter: brightness(1.1);
        }
        .premium-btn:active { transform: translateY(0); }
        .premium-btn:disabled { background: #374151; cursor: not-allowed; transform: none; box-shadow: none; }

        .input-field {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            color: white;
            padding: 12px 16px;
            font-family: var(--font-main);
            font-size: 14px;
            transition: border-color 0.2s;
            width: 100%;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const CLAUDE_MODEL = "claude-3-5-sonnet-20240620";

        // Helper to call our serverless proxy instead of Anthropic directly (to avoid CORS)
        async function fetchAIProxy(body) {
            const res = await fetch("/api/analyze", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body),
            });
            const data = await res.json();
            if (!res.ok) {
                const msg = data.error?.message || data.error || data.details || JSON.stringify(data);
                throw new Error(msg);
            }
            return data;
        }

        // Step 1: Fetch Clarity data via our proxy
        async function fetchClarityViaClaudeTools(apiToken, numOfDays) {
            const clarityUrl = `https://www.clarity.ms/export-data/api/v1/project-live-insights?numOfDays=${numOfDays}&dimension1=Browser&dimension2=Device&dimension3=OS`;

            try {
                const res = await fetch("/api/analyze", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        action: "fetch",
                        url: clarityUrl,
                        headers: { "Authorization": `Bearer ${apiToken}` }
                    }),
                });
                
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || "Failed to fetch Clarity data");
                }
                
                return { data: data, raw: JSON.stringify(data, null, 2), error: null };
            } catch (e) {
                return { data: null, raw: "", error: e.message || String(e) };
            }
        }

        // Step 2: Ask Claude to analyze the data and return insights
        async function analyzeWithClaude(systemPrompt, clarityData, csvData, history = []) {
            const stats = extractStats(clarityData);
            const payload = {
                summary: stats,
                clarityMetrics: Array.isArray(clarityData) ? clarityData.map(m => ({
                    name: m.metricName,
                    total: typeof m.information === 'object' ? 
                        (Array.isArray(m.information) ? m.information.reduce((a, b) => a + (parseInt(b.Total || b.TotalSessions || 0)), 0) : "Complex") : m.information
                })) : "No live data",
                csvSample: csvData?.slice(0, 10)
            };

            const messages = history.length > 0 ? history : [{
                role: "user",
                content: `Analyze this behavioral data and give me 5 improvements: ${JSON.stringify(payload)}`,
            }];

            const body = {
                model: CLAUDE_MODEL,
                max_tokens: 1000,
                system: systemPrompt,
                messages: messages,
            };

            try {
                const data = await fetchAIProxy(body);
                return data.content?.map((b) => b.text || "").join("") || "No response.";
            } catch (e) {
                console.error("AI Analysis Error:", e);
                return "Error: " + (e.message || String(e));
            }
        }

        // ── CSV parser ────────────────────────────────────────────────────────────────
        function parseCSV(text) {
            const lines = text.trim().split("\n");
            if (lines.length < 2) return [];
            const headers = lines[0].split(",").map((h) => h.trim().replace(/"/g, ""));
            return lines.slice(1).map((line) => {
                const vals = line.split(",").map((v) => v.trim().replace(/"/g, ""));
                return Object.fromEntries(headers.map((h, i) => [h, vals[i] ?? ""]));
            });
        }

        function extractStats(data) {
            if (!data) return null;
            
            const rows = Array.isArray(data) ? data : data?.metrics || data?.data || [];
            if (!rows.length) return null;

            const sumArr = (arr, prop) => {
                if (!Array.isArray(arr)) return parseInt(arr?.[prop] || 0);
                return arr.reduce((acc, curr) => acc + (parseInt(curr[prop] || curr.sessionsCount || curr.TotalSessions || curr.totalSessions || 0)), 0);
            };

            const traffic = rows.find(r => r.metricName === "Traffic")?.information || [];
            const deadTaps = rows.find(r => r.metricName === "DeadTapCount")?.information || [];
            const rageTaps = rows.find(r => r.metricName === "RageTapCount")?.information || [];
            const engagement = rows.find(r => r.metricName === "EngagementTime")?.information || [];

            let sessions = sumArr(traffic, "totalSessionCount") || sumArr(traffic, "sessionsCount") || sumArr(traffic, "TotalSessions");
            // FALLBACK: If traffic is 0 but we have clicks, use the session count from clicks
            if (!sessions) sessions = sumArr(deadTaps, "sessionsCount") || sumArr(rageTaps, "sessionsCount");

            const pageViews = sumArr(traffic, "totalPageViews") || sumArr(traffic, "TotalPageViews");
            const rageClicks = sumArr(rageTaps, "Total") || sumArr(rageTaps, "sessionsCount") || 0;
            const deadClicks = sumArr(deadTaps, "Total") || sumArr(deadTaps, "sessionsCount") || 0;
            
            return { sessions: sessions || 0, pageViews: pageViews || 0, rageClicks: rageClicks || 0, deadClicks: deadClicks || 0, rows: rows.length };
        }

        const SYSTEM_PROMPT = `You are a senior product analyst AI specializing in mobile UX and college application platforms.
Analyze user behavior data and give sharp, actionable product improvement ideas. Structure each insight with a key finding, the "why", and a specific recommendation with priority.`;

        // ── UI Components ─────────────────────────────────────────────────────────────
        function Stat({ icon, label, value, sub, color }) {
            return (
                <div className="glass-card" style={{ padding: "20px", flex: 1, minWidth: 200 }}>
                    <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 12 }}>
                        <div style={{ padding: "8px", background: "rgba(255,255,255,0.03)", borderRadius: "10px", fontSize: "18px" }}>{icon}</div>
                        <div style={{ fontSize: "11px", color: "var(--text-muted)", fontFamily: "var(--font-mono)", textTransform: "uppercase", letterSpacing: "0.05em" }}>{label}</div>
                    </div>
                    <div style={{ fontSize: "28px", fontWeight: "700", fontFamily: "var(--font-display)", color: "white", marginBottom: "4px" }}>{value}</div>
                    {sub && <div style={{ fontSize: "12px", color: "var(--text-dim)" }}>{sub}</div>}
                </div>
            );
        }

        function InsightCard({ text, i }) {
            return (
                <div className="glass-card" style={{ padding: "20px", marginBottom: "16px", background: "rgba(255,255,255,0.02)" }}>
                    <div style={{ display: "flex", gap: "16px" }}>
                        <div style={{ width: "24px", height: "24px", borderRadius: "50%", background: "var(--accent)", color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "12px", fontWeight: "700", flexShrink: 0 }}>{i + 1}</div>
                        <p style={{ margin: 0, fontSize: "14px", color: "var(--text-main)", lineHeight: "1.7", whiteSpace: "pre-wrap" }}>{text}</p>
                    </div>
                </div>
            );
        }

        function Bubble({ msg }) {
            const u = msg.role === "user";
            return (
                <div style={{ display: "flex", justifyContent: u ? "flex-end" : "flex-start", marginBottom: 16 }}>
                    <div style={{ 
                        maxWidth: "80%", 
                        background: u ? "var(--accent)" : "var(--card-bg)", 
                        color: u ? "white" : "var(--text-main)",
                        borderRadius: u ? "16px 16px 4px 16px" : "16px 16px 16px 4px", 
                        padding: "12px 18px", 
                        fontSize: "14px", 
                        lineHeight: "1.6",
                        border: "1px solid var(--card-border)",
                        boxShadow: "0 4px 12px rgba(0,0,0,0.1)"
                    }}>
                        {msg.content}
                    </div>
                </div>
            );
        }

        function StatusBadge({ connected }) {
            return (
                <div style={{ display: "flex", alignItems: "center", gap: "8px", padding: "6px 12px", background: "rgba(255,255,255,0.03)", borderRadius: "20px", border: "1px solid var(--card-border)" }}>
                    <div style={{ width: "8px", height: "8px", borderRadius: "50%", background: connected ? "#10b981" : "#ef4444", boxShadow: connected ? "0 0 12px #10b981" : "none" }}></div>
                    <span style={{ fontSize: "12px", fontWeight: "600", color: connected ? "#10b981" : "var(--text-dim)" }}>
                        {connected ? "LIVE" : "DISCONNECTED"}
                    </span>
                </div>
            );
        }

        // ── Main App ──────────────────────────────────────────────────────────────────
        function App() {
            const [tab, setTab] = useState("setup");
            const [token, setToken] = useState("");
            const [days, setDays] = useState(1);
            const [clarityData, setClarityData] = useState(null);
            const [rawResponse, setRawResponse] = useState("");
            const [csv, setCsv] = useState(null);
            const [csvName, setCsvName] = useState("");
            const [loading, setLoading] = useState(false);
            const [loadingMsg, setLoadingMsg] = useState("");
            const [insights, setInsights] = useState([]);
            const [chat, setChat] = useState([]);
            const [chatInput, setChatInput] = useState("");
            const [chatLoading, setChatLoading] = useState(false);
            const [err, setErr] = useState("");
            const fileRef = useRef(null);
            const endRef = useRef(null);

            useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [chat]);

            async function connect() {
                if (!token.trim()) { setErr("Please enter your API token."); return; }
                setLoading(true); setErr(""); setClarityData(null); setInsights([]);
                setLoadingMsg("Fetching behavioral data...");
                
                try {
                    const cleanToken = token.trim().replace(/^Bearer\s+/i, "");
                    const result = await fetchClarityViaClaudeTools(cleanToken, days);
                    setRawResponse(result.raw || "");

                    if (result.error && !result.data) {
                        setErr(`⚠️ Connection Error: ${result.error.slice(0, 180)}`);
                    } else {
                        setClarityData(result.data);
                        setLoadingMsg("Generating AI insights...");
                        const reply = await analyzeWithClaude(SYSTEM_PROMPT, result.data, csv);
                        const parts = reply.split(/\n(?=\d+\.)/).filter(Boolean);
                        setInsights(parts.length > 1 ? parts : [reply]);
                        setTab("dashboard");
                    }
                } catch (e) {
                    setErr(e.message);
                } finally {
                    setLoading(false);
                    setLoadingMsg("");
                }
            }

            const stats = extractStats(clarityData);
            const connected = !!clarityData;
            const lbl = { display: "block", fontSize: "12px", fontWeight: "600", color: "var(--text-dim)", marginBottom: "8px", fontFamily: "var(--font-display)", textTransform: "uppercase", letterSpacing: "0.05em" };

            return (
                <div style={{ maxWidth: 1200, margin: "0 auto", padding: "0 24px" }}>
                    <header style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "32px 0", marginBottom: "32px" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: "12px" }}>
                            <div style={{ width: "36px", height: "36px", borderRadius: "10px", background: "var(--accent)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "20px" }}>✧</div>
                            <h1 style={{ fontSize: "24px", fontWeight: "700", fontFamily: "var(--font-display)", letterSpacing: "-0.02em" }}>Clarity Agent</h1>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: "24px" }}>
                            <nav style={{ display: "flex", gap: "8px", background: "rgba(255,255,255,0.03)", padding: "4px", borderRadius: "12px", border: "1px solid var(--card-border)" }}>
                                {["setup", "dashboard", "chat"].map(t => (
                                    <button key={t} onClick={() => setTab(t)} style={{ 
                                        padding: "8px 16px", borderRadius: "8px", border: "none", 
                                        background: tab === t ? "rgba(255,255,255,0.08)" : "transparent",
                                        color: tab === t ? "white" : "var(--text-dim)",
                                        fontSize: "14px", fontWeight: "600", cursor: "pointer", transition: "all 0.2s"
                                    }}>{t.charAt(0).toUpperCase() + t.slice(1)}</button>
                                ))}
                            </nav>
                            <StatusBadge connected={connected} />
                        </div>
                    </header>

                    <main style={{ animation: "fadeIn 0.6s ease-out" }}>
                        {tab === "setup" && (
                            <div style={{ maxWidth: "600px", margin: "0 auto" }}>
                                <div className="glass-card" style={{ padding: "40px" }}>
                                    <h2 style={{ fontSize: "28px", fontWeight: "700", fontFamily: "var(--font-display)", marginBottom: "8px" }}>Configure Agent</h2>
                                    <p style={{ color: "var(--text-dim)", fontSize: "15px", marginBottom: "32px" }}>Connect your Microsoft Clarity instance to start generating behavioral insights.</p>
                                    
                                    <div style={{ marginBottom: "24px" }}>
                                        <label style={lbl}>Data Export API Token</label>
                                        <input className="input-field" type="password" placeholder="Paste your Clarity API token" value={token} onChange={(e) => setToken(e.target.value)} onKeyDown={(e) => e.key === "Enter" && connect()} />
                                        <p style={{ marginTop: "8px", fontSize: "12px", color: "var(--text-muted)" }}>Settings → Data Export → Generate new API token</p>
                                    </div>

                                    <div style={{ marginBottom: "32px" }}>
                                        <label style={lbl}>Time Window</label>
                                        <div style={{ display: "flex", gap: "12px" }}>
                                            {[1, 2, 3].map(d => (
                                                <button key={d} onClick={() => setDays(d)} style={{ 
                                                    flex: 1, padding: "12px", borderRadius: "10px", border: "1px solid", 
                                                    borderColor: days === d ? "var(--accent)" : "var(--card-border)",
                                                    background: days === d ? "var(--accent-glow)" : "transparent",
                                                    color: days === d ? "white" : "var(--text-dim)",
                                                    fontSize: "14px", fontWeight: "600", cursor: "pointer"
                                                }}>{d * 24}h</button>
                                            ))}
                                        </div>
                                    </div>

                                    {err && (
                                        <div style={{ padding: "16px", background: "rgba(239, 68, 68, 0.1)", border: "1px solid rgba(239, 68, 68, 0.2)", borderRadius: "10px", marginBottom: "24px", color: "#fca5a5", fontSize: "14px" }}>{err}</div>
                                    )}

                                    <button className="premium-btn" style={{ width: "100%" }} onClick={connect} disabled={loading}>
                                        {loading ? (loadingMsg || "Connecting...") : "Synchronize & Analyze →"}
                                    </button>
                                </div>
                            </div>
                        )}

                        {tab === "dashboard" && (
                            <div>
                                {(connected || csv) ? (
                                    <div style={{ display: "grid", gridTemplateColumns: "1fr 400px", gap: "32px", alignItems: "start" }}>
                                        <div style={{ display: "flex", flexDirection: "column", gap: "32px" }}>
                                            <section>
                                                <h3 style={lbl}>Behavioral Metrics</h3>
                                                <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: "20px", marginTop: "16px" }}>
                                                    <Stat icon="👥" label="Total Sessions" value={stats.sessions.toLocaleString()} sub="Unique interactions" color="#6366f1" />
                                                    <Stat icon="🖱️" label="Dead Clicks" value={stats.deadClicks.toLocaleString()} sub={`${((stats.deadClicks / Math.max(1, stats.sessions)) * 100).toFixed(1)}% friction rate`} color="#f43f5e" />
                                                    <Stat icon="🔥" label="Rage Clicks" value={stats.rageClicks.toLocaleString()} sub="High-friction events" color="#f59e0b" />
                                                    <Stat icon="📄" label="Page Views" value={stats.pageViews.toLocaleString()} sub="Total depth" color="#10b981" />
                                                </div>
                                            </section>

                                            <section>
                                                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "16px" }}>
                                                    <h3 style={lbl}>AI Product Insights</h3>
                                                    <button onClick={connect} style={{ fontSize: "12px", background: "transparent", border: "none", color: "var(--accent)", cursor: "pointer", fontWeight: "600" }}>↺ Refresh Analysis</button>
                                                </div>
                                                {insights.length === 0 ? (
                                                    <div className="glass-card" style={{ padding: "40px", textAlign: "center" }}>
                                                        <div style={{ width: "24px", height: "24px", border: "2px solid var(--accent)", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.8s linear infinite", margin: "0 auto 16px" }}></div>
                                                        <p style={{ color: "var(--text-dim)", fontSize: "14px" }}>Claude is analyzing behavioral patterns...</p>
                                                    </div>
                                                ) : (
                                                    insights.map((text, i) => <InsightCard key={i} text={text} i={i} />)
                                                )}
                                            </section>
                                        </div>

                                        <aside className="glass-card" style={{ position: "sticky", top: "32px", padding: "24px", height: "calc(100vh - 64px)", display: "flex", flexDirection: "column" }}>
                                            <h3 style={{ ...lbl, marginBottom: "20px" }}>Strategic Chat</h3>
                                            <div style={{ flex: 1, overflowY: "auto", paddingRight: "8px", marginBottom: "20px" }}>
                                                {chat.map((m, i) => <Bubble key={i} msg={m} />)}
                                                <div ref={endRef} />
                                            </div>
                                            <div style={{ position: "relative" }}>
                                                <input className="input-field" placeholder="Ask Claude..." value={chatInput} disabled={chatLoading} onChange={(e) => setChatInput(e.target.value)} onKeyDown={async (e) => {
                                                    if (e.key === "Enter" && chatInput.trim() && !chatLoading) {
                                                        const userMsg = chatInput.trim();
                                                        setChatInput("");
                                                        setChat(prev => [...prev, { role: "user", content: userMsg }]);
                                                        setChatLoading(true);
                                                        const reply = await analyzeWithClaude(SYSTEM_PROMPT, clarityData, csv, [...chat, { role: "user", content: userMsg }]);
                                                        setChat(prev => [...prev, { role: "assistant", content: reply }]);
                                                        setChatLoading(false);
                                                    }
                                                }} />
                                            </div>
                                        </aside>
                                    </div>
                                ) : (
                                    <div className="glass-card" style={{ padding: "60px", textAlign: "center" }}>
                                        <div style={{ fontSize: "40px", marginBottom: "20px" }}>📡</div>
                                        <h3 style={{ fontSize: "24px", fontWeight: "700", fontFamily: "var(--font-display)", marginBottom: "12px" }}>Waiting for Data</h3>
                                        <button className="premium-btn" onClick={() => setTab("setup")}>Go to Setup</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {tab === "chat" && (
                            <div style={{ maxWidth: "800px", margin: "0 auto" }}>
                                <div className="glass-card" style={{ height: "calc(100vh - 180px)", display: "flex", flexDirection: "column", padding: "32px" }}>
                                    <h2 style={{ fontSize: "24px", fontWeight: "700", fontFamily: "var(--font-display)", marginBottom: "32px" }}>Strategy Consultant</h2>
                                    <div style={{ flex: 1, overflowY: "auto", paddingRight: "16px", marginBottom: "24px" }}>
                                        {chat.map((m, i) => <Bubble key={i} msg={m} />)}
                                        <div ref={endRef} />
                                    </div>
                                    <input className="input-field" style={{ padding: "16px 20px", fontSize: "15px" }} placeholder="Type your message..." value={chatInput} disabled={chatLoading} onChange={(e) => setChatInput(e.target.value)} onKeyDown={async (e) => {
                                        if (e.key === "Enter" && chatInput.trim() && !chatLoading) {
                                            const userMsg = chatInput.trim();
                                            setChatInput("");
                                            setChat(prev => [...prev, { role: "user", content: userMsg }]);
                                            setChatLoading(true);
                                            const reply = await analyzeWithClaude(SYSTEM_PROMPT, clarityData, csv, [...chat, { role: "user", content: userMsg }]);
                                            setChat(prev => [...prev, { role: "assistant", content: reply }]);
                                            setChatLoading(false);
                                        }
                                    }} />
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
