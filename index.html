<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarity AI Agent | Product Intelligence</title>
    <!-- React and ReactDOM CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel CDN for JSX support in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        :root {
            --bg-deep: #080a0d;
            --primary: #06d6a0;
            --secondary: #118ab2;
            --accent: #ffd166;
            --text-main: #e0e0e0;
            --text-muted: #555;
            --border: rgba(255, 255, 255, 0.07);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const CLAUDE_MODEL = "claude-sonnet-4-6";

        // Helper to call our serverless proxy instead of Anthropic directly (to avoid CORS)
        async function fetchAIProxy(body) {
            const res = await fetch("/api/analyze", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body),
            });
            const data = await res.json();
            if (!res.ok) {
                // If it's an Anthropic error object { error: { message: "..." } }
                const msg = data.error?.message || data.error || data.details || JSON.stringify(data);
                throw new Error(msg);
            }
            return data;
        }

        // Step 1: Fetch Clarity data via our proxy
        async function fetchClarityViaClaudeTools(apiToken, numOfDays) {
            const clarityUrl = `https://www.clarity.ms/export-data/api/v1/project-live-insights?numOfDays=${numOfDays}&dimension1=Browser&dimension2=Device&dimension3=OS`;

            try {
                const res = await fetch("/api/analyze", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        action: "fetch",
                        url: clarityUrl,
                        headers: { "Authorization": `Bearer ${apiToken}` }
                    }),
                });
                
                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.error || "Failed to fetch Clarity data");
                }
                
                return { data: data, raw: JSON.stringify(data), error: null };
            } catch (e) {
                return { data: null, raw: "", error: e.message || String(e) };
            }
        }

        // Step 2: Ask Claude to analyze the data and return insights
        async function analyzeWithClaude(systemPrompt, clarityData, csvData) {
            const stats = extractStats(clarityData);
            const payload = {
                summary: stats,
                clarityMetrics: Array.isArray(clarityData) ? clarityData.map(m => ({
                    name: m.metricName,
                    total: typeof m.information === 'object' ? 
                        (Array.isArray(m.information) ? m.information.reduce((a, b) => a + (parseInt(b.Total || b.TotalSessions || 0)), 0) : "Complex") : m.information
                })) : "No live data",
                csvSample: csvData?.slice(0, 10)
            };

            const body = {
                model: CLAUDE_MODEL,
                max_tokens: 1000,
                system: systemPrompt,
                messages: [{
                    role: "user",
                    content: `Analyze this behavioral data and give me 5 improvements: ${JSON.stringify(payload)}`,
                }],
            };

            try {
                const data = await fetchAIProxy(body);
                if (data.error) {
                    const detailStr = data.message || (data.details ? JSON.stringify(data.details) : "");
                    throw new Error(`${data.error}${detailStr ? ": " + detailStr : ""}`);
                }
                return data.content?.map((b) => b.text || "").join("") || "No response.";
            } catch (e) {
                console.error("AI Analysis Error:", e);
                return "Error: " + (e.message || String(e));
            }
        }

        // Step 3: Chat with context
        async function chatWithClaude(systemPrompt, userMessage, history, clarityData, csvData) {
            const ctx = `\n\nCurrent Clarity data:\n${JSON.stringify({ clarityData, csvSample: csvData?.slice(0, 15) }, null, 2)}`;

            const body = {
                model: CLAUDE_MODEL,
                max_tokens: 1000,
                system: systemPrompt + ctx,
                messages: [...history, { role: "user", content: userMessage }],
            };

            try {
                const data = await fetchAIProxy(body);
                return data.content?.map((b) => b.text || "").join("") || "No response.";
            } catch (e) {
                return "Error: " + (e.message || String(e));
            }
        }

        // ── CSV parser ────────────────────────────────────────────────────────────────
        function parseCSV(text) {
            const lines = text.trim().split("\n");
            if (lines.length < 2) return [];
            const headers = lines[0].split(",").map((h) => h.trim().replace(/"/g, ""));
            return lines.slice(1).map((line) => {
                const vals = line.split(",").map((v) => v.trim().replace(/"/g, ""));
                return Object.fromEntries(headers.map((h, i) => [h, vals[i] ?? ""]));
            });
        }

        function extractStats(data) {
            if (!data) return null;
            
            const rows = Array.isArray(data) ? data : data?.metrics || data?.data || [];
            if (!rows.length) return null;

            const sumArr = (arr, prop) => {
                if (!Array.isArray(arr)) return parseInt(arr?.[prop] || 0);
                return arr.reduce((acc, curr) => acc + (parseInt(curr[prop] || curr.sessionsCount || curr.TotalSessions || curr.totalSessions || 0)), 0);
            };

            const traffic = rows.find(r => r.metricName === "Traffic")?.information || [];
            const deadTaps = rows.find(r => r.metricName === "DeadTapCount")?.information || [];
            const rageTaps = rows.find(r => r.metricName === "RageTapCount")?.information || [];
            const engagement = rows.find(r => r.metricName === "EngagementTime")?.information || [];

            let sessions = sumArr(traffic, "totalSessionCount") || sumArr(traffic, "sessionsCount") || sumArr(traffic, "TotalSessions");
            // FALLBACK: If traffic is 0 but we have clicks, use the session count from clicks
            if (!sessions) sessions = sumArr(deadTaps, "sessionsCount") || sumArr(rageTaps, "sessionsCount");

            const pageViews = sumArr(traffic, "totalPageViews") || sumArr(traffic, "TotalPageViews");
            const rageClicks = sumArr(rageTaps, "Total") || sumArr(rageTaps, "sessionsCount") || 0;
            const deadClicks = sumArr(deadTaps, "Total") || sumArr(deadTaps, "sessionsCount") || 0;
            
            if (sessions || pageViews || rageClicks || deadClicks) {
                let avgScroll = null;
                if (Array.isArray(engagement) && engagement.length > 0) {
                    const valid = engagement.filter(e => e.AverageScrollDepth > 0 || e.activeTime > 0);
                    if (valid.length) {
                        avgScroll = valid[0].AverageScrollDepth || (valid[0].activeTime / 10).toFixed(1);
                    }
                }
                return { sessions, pageViews, rageClicks, deadClicks, avgScroll, rows: rows.length };
            }

            // Fallback for CSV or other array-based data
            let s = 0, pv = 0, rc = 0, dc = 0, scrollSum = 0, scrollN = 0;
            rows.forEach((r) => {
                s += parseInt(r.sessions || r.sessionsCount || r.totalSessions || 0);
                pv += parseInt(r.pageViews || r.totalPageViews || 0);
                rc += parseInt(r.rageClicks || r.rageClickCount || 0);
                dc += parseInt(r.deadClicks || r.deadClickCount || 0);
                const sd = parseFloat(r.scrollDepth || r.avgScrollDepth || 0);
                if (sd > 0) { scrollSum += sd; scrollN++; }
            });
            return { sessions: s, pageViews: pv, rageClicks: rc, deadClicks: dc, avgScroll: scrollN ? (scrollSum / scrollN).toFixed(1) : null, rows: rows.length };
        }

        const SYSTEM_PROMPT = `You are a senior product analyst AI specializing in mobile UX and college application platforms.
You have access to Microsoft Clarity behavioral data for a college application mobile app where students apply directly to colleges.

Analyze user behavior data and give sharp, actionable product improvement ideas. Focus on:
- Drop-off points in the application funnel
- Rage clicks / dead clicks signaling confusion
- Device/browser/OS patterns causing friction
- Navigation confusion and form friction

Structure each insight as:
1. Key insight (what the data shows)
2. Why it matters for students applying to college
3. Specific product improvement recommendation
4. Priority: 🔴 Critical / 🟡 Medium / 🟢 Nice-to-have

Be direct and actionable.`;

        // ── UI Components ─────────────────────────────────────────────────────────────
        function Stat({ icon, label, value, sub, color }) {
            return (
                <div style={{ background: "rgba(255,255,255,0.04)", borderTop: `2px solid ${color}`, borderRadius: 12, padding: "18px 20px" }}>
                    <div style={{ fontSize: 20, marginBottom: 6 }}>{icon}</div>
                    <div style={{ fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", color: "#555", fontFamily: "'DM Mono',monospace", marginBottom: 4 }}>{label}</div>
                    <div style={{ fontSize: 24, fontWeight: 700, color, fontFamily: "'Syne',sans-serif" }}>{value}</div>
                    {sub && <div style={{ fontSize: 11, color: "#444", marginTop: 2 }}>{sub}</div>}
                </div>
            );
        }

        function InsightCard({ text, i }) {
            const cols = ["#ff6b6b", "#ffd166", "#06d6a0", "#118ab2", "#a29bfe"];
            return (
                <div style={{ background: "rgba(255,255,255,0.025)", borderLeft: `3px solid ${cols[i % 5]}`, borderRadius: 10, padding: "16px 20px", marginBottom: 10 }}>
                    <p style={{ margin: 0, fontSize: 13.5, color: "#ccc", lineHeight: 1.8, fontFamily: "'DM Sans',sans-serif", whiteSpace: "pre-wrap" }}>{text}</p>
                </div>
            );
        }

        function Bubble({ msg }) {
            const u = msg.role === "user";
            return (
                <div style={{ display: "flex", justifyContent: u ? "flex-end" : "flex-start", marginBottom: 12 }}>
                    {!u && <div style={{ width: 26, height: 26, borderRadius: "50%", background: "linear-gradient(135deg,#06d6a0,#118ab2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, marginRight: 8, flexShrink: 0, marginTop: 3 }}>✦</div>}
                    <div style={{ maxWidth: "76%", background: u ? "linear-gradient(135deg,#1a6b5a,#0d4a3f)" : "rgba(255,255,255,0.05)", border: u ? "1px solid #06d6a025" : "1px solid rgba(255,255,255,0.07)", borderRadius: u ? "16px 4px 16px 16px" : "4px 16px 16px 16px", padding: "11px 15px", fontSize: 13.5, color: "#d0d0d0", lineHeight: 1.75, fontFamily: "'DM Sans',sans-serif", whiteSpace: "pre-wrap" }}>{msg.content}</div>
                </div>
            );
        }

        function StatusBadge({ label, color }) {
            return <span style={{ fontSize: 11, fontFamily: "'DM Mono',monospace", color }}>{color === "#06d6a0" ? "●" : "○"} {label}</span>;
        }

        // ── Main App ──────────────────────────────────────────────────────────────────
        function App() {
            const [tab, setTab] = useState("setup");
            const [token, setToken] = useState("");
            const [days, setDays] = useState(1);
            const [clarityData, setClarityData] = useState(null);
            const [rawResponse, setRawResponse] = useState("");
            const [csv, setCsv] = useState(null);
            const [csvName, setCsvName] = useState("");
            const [loading, setLoading] = useState(false);
            const [loadingMsg, setLoadingMsg] = useState("");
            const [insights, setInsights] = useState([]);
            const [chat, setChat] = useState([]);
            const [chatInput, setChatInput] = useState("");
            const [chatLoading, setChatLoading] = useState(false);
            const [err, setErr] = useState("");
            const [showRaw, setShowRaw] = useState(false);
            const fileRef = useRef(null);
            const endRef = useRef(null);

            useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [chat]);

            async function connect() {
                if (!token.trim()) { setErr("Please enter your API token."); return; }
                setLoading(true); setErr(""); setClarityData(null); setInsights([]);

                // Step 1: fetch via Claude tools
                setLoadingMsg("Fetching data from Clarity via Claude…");
                const cleanToken = token.trim().replace(/^Bearer\s+/i, "");
                const result = await fetchClarityViaClaudeTools(cleanToken, days);
                setRawResponse(result.raw || "");

                if (result.error && !result.data) {
                    setErr(`⚠️ Couldn't fetch live data: ${result.error.slice(0, 180)}. Proceeding with CSV data (if uploaded) and AI expertise.`);
                } else {
                    setClarityData(result.data);
                }

                // Step 2: generate insights regardless
                setLoadingMsg("Generating product insights…");
                const reply = await analyzeWithClaude(SYSTEM_PROMPT, result.data, csv);
                const parts = reply.split(/\n(?=\d+\.)/).filter(Boolean);
                setInsights(parts.length > 1 ? parts : [reply]);

                setLoading(false);
                setLoadingMsg("");
                setTab("dashboard");
            }

            function handleFile(e) {
                const f = e.target.files?.[0]; if (!f) return;
                setCsvName(f.name);
                const reader = new FileReader();
                reader.onload = (ev) => setCsv(parseCSV(ev.target.result));
                reader.readAsText(f);
            }

            async function reAnalyze() {
                setLoading(true); setLoadingMsg("Re-analyzing…");
                const reply = await analyzeWithClaude(SYSTEM_PROMPT, clarityData, csv);
                const parts = reply.split(/\n(?=\d+\.)/).filter(Boolean);
                setInsights(parts.length > 1 ? parts : [reply]);
                setLoading(false); setLoadingMsg("");
            }

            async function send() {
                if (!chatInput.trim() || chatLoading) return;
                const msg = chatInput.trim(); setChatInput("");
                const next = [...chat, { role: "user", content: msg }];
                setChat(next); setChatLoading(true);
                const reply = await chatWithClaude(SYSTEM_PROMPT, msg, chat, clarityData, csv);
                setChat([...next, { role: "assistant", content: reply }]);
                setChatLoading(false);
            }

            const stats = extractStats(clarityData);
            const isConnected = !!clarityData;

            // Styles
            const inp = { width: "100%", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, padding: "11px 14px", color: "#e0e0e0", fontSize: 14, fontFamily: "'DM Mono',monospace", outline: "none", boxSizing: "border-box" };
            const btn = (v = "p") => ({ padding: "10px 20px", borderRadius: 10, border: "none", background: v === "p" ? "linear-gradient(135deg,#06d6a0,#118ab2)" : "rgba(255,255,255,0.06)", color: v === "p" ? "#000" : "#888", fontWeight: 700, fontSize: 14, cursor: "pointer", fontFamily: "'Syne',sans-serif" });
            const navBtn = (a) => ({ padding: "6px 13px", borderRadius: 8, border: "none", background: a ? "rgba(6,214,160,0.1)" : "transparent", color: a ? "#06d6a0" : "#555", fontSize: 13, fontWeight: a ? 600 : 400, cursor: "pointer", fontFamily: "'DM Sans',sans-serif" });
            const card = { background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 14, padding: 24, marginBottom: 14 };
            const lbl = { fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", color: "#555", marginBottom: 6, display: "block", fontFamily: "'DM Mono',monospace" };

            return (
                <div style={{ minHeight: "100vh", background: "#080a0d", fontFamily: "'DM Sans',sans-serif", color: "#e0e0e0" }}>

                    {/* Header */}
                    <header style={{ borderBottom: "1px solid rgba(255,255,255,0.06)", padding: "0 26px", display: "flex", alignItems: "center", justifyContent: "space-between", height: 56, background: "rgba(8,10,13,0.97)", backdropFilter: "blur(16px)", position: "sticky", top: 0, zIndex: 100 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
                            <div style={{ width: 28, height: 28, borderRadius: 8, background: "linear-gradient(135deg,#06d6a0,#118ab2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13 }}>✦</div>
                            <span style={{ fontSize: 15, fontWeight: 700, fontFamily: "'Syne',sans-serif", color: "#fff", letterSpacing: "-0.02em" }}>Clarity Agent</span>
                            <span style={{ fontSize: 11, color: "#222", fontFamily: "'DM Mono',monospace" }}>/ college app</span>
                        </div>
                        <nav style={{ display: "flex", gap: 2 }}>
                            {["setup", "dashboard", "chat"].map((t) => (
                                <button key={t} style={navBtn(tab === t)} onClick={() => setTab(t)}>
                                    {t === "setup" ? "⚙ Setup" : t === "dashboard" ? "◈ Dashboard" : "◎ Chat"}
                                </button>
                            ))}
                        </nav>
                        <div style={{ display: "flex", gap: 12 }}>
                            <StatusBadge label={isConnected ? "API connected" : "Not connected"} color={isConnected ? "#06d6a0" : "#333"} />
                            {csv && <StatusBadge label="CSV loaded" color="#ffd166" />}
                        </div>
                    </header>

                    <main style={{ maxWidth: 1040, margin: "0 auto", padding: "26px 20px" }}>

                        {/* ── SETUP ── */}
                        {tab === "setup" && (
                            <div style={{ maxWidth: 520, animation: "fadeIn 0.6s ease" }}>
                                <h1 style={{ fontSize: 28, fontWeight: 800, fontFamily: "'Syne',sans-serif", margin: "0 0 6px", letterSpacing: "-0.03em" }}>Connect Clarity</h1>
                                <p style={{ color: "#444", fontSize: 14, margin: "0 0 26px" }}>Paste your Data Export API token. The agent fetches data through Claude's servers — no CORS issues.</p>

                                <div style={card}>
                                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 18 }}>
                                        <span style={{ fontSize: 18 }}>🔌</span>
                                        <span style={{ fontWeight: 700, fontFamily: "'Syne',sans-serif" }}>Microsoft Clarity API</span>
                                    </div>

                                    <div style={{ marginBottom: 18 }}>
                                        <label style={lbl}>Data Export API Token</label>
                                        <input style={inp} type="password" placeholder="Paste your token here" value={token} onChange={(e) => setToken(e.target.value)} onKeyDown={(e) => e.key === "Enter" && connect()} />
                                        <p style={{ margin: "5px 0 0", fontSize: 12, color: "#3a3a3a" }}>Clarity → Settings → Data Export → Generate new API token</p>
                                    </div>

                                    <div style={{ marginBottom: 18 }}>
                                        <label style={lbl}>Time range (Clarity supports max 72h)</label>
                                        <div style={{ display: "flex", gap: 8 }}>
                                            {[1, 2, 3].map((d) => (
                                                <button key={d} onClick={() => setDays(d)} style={{ ...btn(days === d ? "p" : "s"), padding: "8px 18px", fontSize: 13 }}>
                                                    {d === 1 ? "24h" : d === 2 ? "48h" : "72h"}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    {err && (
                                        <div style={{ background: "rgba(255,200,50,0.07)", border: "1px solid rgba(255,200,50,0.2)", borderRadius: 8, padding: "10px 14px", marginBottom: 12 }}>
                                            <p style={{ margin: 0, color: "#ffd166", fontSize: 13, lineHeight: 1.6 }}>{err}</p>
                                        </div>
                                    )}

                                    <button style={btn()} onClick={connect} disabled={loading}>
                                        {loading ? (
                                            <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                                <span style={{ display: "inline-block", width: 12, height: 12, border: "2px solid #000", borderTopColor: "transparent", borderRadius: "50%", animation: "spin 0.7s linear infinite" }} />
                                                {loadingMsg || "Connecting…"}
                                            </span>
                                        ) : "Connect & Analyze →"}
                                    </button>
                                </div>

                                {/* CSV */}
                                <div style={card}>
                                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                                        <span style={{ fontSize: 18 }}>📂</span>
                                        <span style={{ fontWeight: 700, fontFamily: "'Syne',sans-serif" }}>Upload CSV Export</span>
                                        <span style={{ fontSize: 11, color: "#333", marginLeft: 4 }}>optional</span>
                                    </div>
                                    <p style={{ fontSize: 13, color: "#444", margin: "0 0 14px", lineHeight: 1.6 }}>
                                        For 7, 30, or 90-day history — export CSV from the Clarity dashboard and upload it here. This also works as a standalone data source if the API is unavailable.
                                    </p>
                                    <input ref={fileRef} type="file" accept=".csv" onChange={handleFile} style={{ display: "none" }} />
                                    <button style={btn("s")} onClick={() => fileRef.current?.click()}>
                                        {csvName ? `✓ ${csvName}` : "Choose CSV file"}
                                    </button>
                                    {csv && <p style={{ fontSize: 12, color: "#06d6a0", marginTop: 8 }}>✓ {csv.length} rows loaded</p>}
                                </div>

                                <div style={{ padding: "12px 16px", background: "rgba(17,138,178,0.06)", borderRadius: 10, border: "1px solid rgba(17,138,178,0.15)" }}>
                                    <p style={{ margin: 0, fontSize: 12, color: "#555", lineHeight: 1.7 }}>
                                        <span style={{ color: "#118ab2" }}>ℹ️</span> Data is fetched through Claude's servers to avoid browser CORS restrictions. Clarity's API is capped at <strong style={{ color: "#888" }}>10 calls/day</strong> per project — use CSV upload for unlimited historical analysis.
                                    </p>
                                </div>
                            </div>
                        )}

                        {/* ── DASHBOARD ── */}
                        {tab === "dashboard" && (
                            <div style={{ animation: "fadeIn 0.6s ease" }}>
                                <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 24 }}>
                                    <div>
                                        <h1 style={{ fontSize: 26, fontWeight: 800, fontFamily: "'Syne',sans-serif", margin: "0 0 4px", letterSpacing: "-0.03em" }}>Product Intelligence</h1>
                                        <p style={{ color: "#444", fontSize: 13, margin: 0 }}>Last {days * 24}h · College application mobile app</p>
                                    </div>
                                    <button style={btn("s")} onClick={reAnalyze} disabled={loading}>{loading ? loadingMsg || "Analyzing…" : "↻ Re-analyze"}</button>
                                </div>

                                {!isConnected && !csv && (
                                    <div style={{ background: "rgba(255,107,107,0.06)", border: "1px solid rgba(255,107,107,0.15)", borderRadius: 12, padding: 16, marginBottom: 22 }}>
                                        <p style={{ margin: 0, color: "#ff6b6b", fontSize: 13 }}>No data loaded. Go to <strong>Setup</strong> to connect Clarity or upload a CSV.</p>
                                    </div>
                                )}

                                {/* Stats */}
                                {stats && (
                                    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(150px,1fr))", gap: 10, marginBottom: 26 }}>
                                <Stat icon="👥" label="Sessions" value={stats.sessions.toLocaleString()} color="#06d6a0" />
                                <Stat icon="📄" label="Page Views" value={stats.pageViews.toLocaleString()} color="#118ab2" />
                                <Stat icon="😤" label="Rage Clicks" value={stats.rageClicks.toLocaleString()} sub="frustration signals" color="#ff6b6b" />
                                <Stat icon="🖱️" label="Dead Clicks" value={stats.deadClicks.toLocaleString()} sub="unresponsive taps" color="#ff9f43" />
                                        {stats.avgScroll && <Stat icon="📜" label="Avg Scroll" value={`${stats.avgScroll}%`} color="#a29bfe" />}
                                        <Stat icon="📊" label="Data Rows" value={stats.rows} sub="dimension breakdown" color="#ffd166" />
                                    </div>
                                )}

                                {/* API data table */}
                                {clarityData && (
                                    <div style={{ marginBottom: 24 }}>
                                        <div style={{ fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", color: "#333", fontFamily: "'DM Mono',monospace", marginBottom: 8 }}>Live Clarity Data</div>
                                        <div style={{ overflowX: "auto", background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 10 }}>
                                            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, fontFamily: "'DM Mono',monospace" }}>
                                                <thead>
                                                    <tr style={{ textAlign: "left", borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
                                                        <th style={{ padding: "10px 12px", color: "#666" }}>Metric</th>
                                                        <th style={{ padding: "10px 12px", color: "#666" }}>Value / Details</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {clarityData.slice(0, 20).map((row, i) => {
                                                        const sum = Array.isArray(row.information) ? 
                                                            row.information.reduce((a, b) => a + (parseInt(b.Total || b.TotalSessions || b.Count || 0)), 0) : 0;
                                                        
                                                        return (
                                                            <tr key={i} style={{ borderBottom: "1px solid rgba(255,255,255,0.03)" }}>
                                                                <td style={{ padding: "10px 12px", color: "#06d6a0", fontWeight: 600 }}>{row.metricName || i}</td>
                                                                <td style={{ padding: "10px 12px", color: "#aaa" }}>
                                                                    <span style={{ color: "#fff", fontWeight: 700, marginRight: 10 }}>{sum > 0 ? sum.toLocaleString() : ""}</span>
                                                                    {typeof row.information === 'object' && (
                                                                        <div style={{ display: 'inline-flex', flexWrap: 'wrap', gap: 6 }}>
                                                                            {Object.entries(Array.isArray(row.information) ? row.information[0] : row.information).slice(0, 3).map(([k, v]) => (
                                                                                <span key={k} style={{ background: 'rgba(255,255,255,0.05)', padding: '2px 6px', borderRadius: 4, fontSize: 10 }}>
                                                                                    {k}: {String(v)}
                                                                                </span>
                                                                            ))}
                                                                        </div>
                                                                    )}
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {/* Raw response toggle */}
                                {rawResponse && (
                                    <div style={{ marginBottom: 24 }}>
                                        <button onClick={() => setShowRaw(!showRaw)} style={{ background: "none", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 7, color: "#444", fontSize: 11, padding: "5px 10px", cursor: "pointer", fontFamily: "'DM Mono',monospace" }}>
                                            {showRaw ? "▲ Hide raw response" : "▼ Show raw API response"}
                                        </button>
                                        {showRaw && <pre style={{ marginTop: 8, background: "rgba(0,0,0,0.4)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 10, padding: 14, fontSize: 11, color: "#555", overflowX: "auto", maxHeight: 260, overflowY: "auto", fontFamily: "'DM Mono',monospace" }}>{rawResponse}</pre>}
                                    </div>
                                )}

                                {/* CSV preview */}
                                {csv && (
                                    <div style={{ marginBottom: 24 }}>
                                        <div style={{ fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", color: "#333", fontFamily: "'DM Mono',monospace", marginBottom: 8 }}>CSV · {csv.length} rows</div>
                                        <div style={{ overflowX: "auto", background: "rgba(0,0,0,0.3)", border: "1px solid rgba(255,255,255,0.05)", borderRadius: 10 }}>
                                            <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12, fontFamily: "'DM Mono',monospace" }}>
                                                <thead><tr>{Object.keys(csv[0] || {}).slice(0, 7).map((h) => <th key={h} style={{ padding: "8px 12px", textAlign: "left", color: "#3a3a3a", borderBottom: "1px solid rgba(255,255,255,0.04)", whiteSpace: "nowrap" }}>{h}</th>)}</tr></thead>
                                                <tbody>{csv.slice(0, 6).map((row, i) => (
                                                    <tr key={i} style={{ borderBottom: "1px solid rgba(255,255,255,0.025)" }}>
                                                        {Object.values(row).slice(0, 7).map((v, j) => <td key={j} style={{ padding: "7px 12px", color: "#666" }}>{v}</td>)}
                                                    </tr>
                                                ))}</tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {/* Insights */}
                                <div>
                                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                                        <div style={{ width: 20, height: 20, borderRadius: "50%", background: "linear-gradient(135deg,#06d6a0,#118ab2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10 }}>✦</div>
                                        <div style={{ fontSize: 11, letterSpacing: "0.1em", textTransform: "uppercase", color: "#333", fontFamily: "'DM Mono',monospace" }}>AI Product Improvement Ideas</div>
                                    </div>
                                    {loading && <p style={{ color: "#333", fontSize: 13, fontFamily: "'DM Mono',monospace" }}>{loadingMsg || "Analyzing…"}</p>}
                                    {!loading && insights.length === 0 && <p style={{ color: "#2a2a2a", fontSize: 13 }}>Connect Clarity or upload a CSV to generate insights.</p>}
                                    {insights.map((ins, i) => <InsightCard key={i} text={ins} i={i} />)}
                                </div>
                            </div>
                        )}

                        {/* ── CHAT ── */}
                        {tab === "chat" && (
                            <div style={{ display: "flex", flexDirection: "column", height: "calc(100vh - 120px)", animation: "fadeIn 0.6s ease" }}>
                                <div style={{ marginBottom: 16 }}>
                                    <h1 style={{ fontSize: 26, fontWeight: 800, fontFamily: "'Syne',sans-serif", margin: "0 0 4px", letterSpacing: "-0.03em" }}>Ask your agent</h1>
                                    <p style={{ color: "#444", fontSize: 13, margin: 0 }}>Your Clarity data is loaded as context. Ask anything about user behavior.</p>
                                </div>

                                {chat.length === 0 && (
                                    <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginBottom: 16 }}>
                                        {["Where are students dropping off?", "What's causing rage clicks?", "Which screens need the most UX work?", "How to improve the college search flow?", "What do device patterns tell us?"].map((q) => (
                                            <button key={q} onClick={() => setChatInput(q)} style={{ padding: "7px 13px", borderRadius: 20, border: "1px solid rgba(255,255,255,0.07)", background: "rgba(255,255,255,0.03)", color: "#555", fontSize: 12, cursor: "pointer", fontFamily: "'DM Sans',sans-serif" }}>{q}</button>
                                        ))}
                                    </div>
                                )}

                                <div style={{ flex: 1, overflowY: "auto", paddingRight: 4, marginBottom: 12 }}>
                                    {chat.length === 0 && (
                                        <div style={{ textAlign: "center", paddingTop: 50, color: "#1e1e1e" }}>
                                            <div style={{ fontSize: 34, marginBottom: 10 }}>◎</div>
                                            <p style={{ fontSize: 13, fontFamily: "'DM Mono',monospace" }}>Ask anything about your users</p>
                                        </div>
                                    )}
                                    {chat.map((m, i) => <Bubble key={i} msg={m} />)}
                                    {chatLoading && (
                                        <div style={{ display: "flex", gap: 8, padding: "6px 0" }}>
                                            <div style={{ width: 26, height: 26, borderRadius: "50%", background: "linear-gradient(135deg,#06d6a0,#118ab2)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11 }}>✦</div>
                                            <div style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: "4px 16px 16px 16px", padding: "11px 15px", color: "#333", fontSize: 13 }}>Thinking…</div>
                                        </div>
                                    )}
                                    <div ref={endRef} />
                                </div>

                                <div style={{ display: "flex", gap: 10 }}>
                                    <input style={{ ...inp, flex: 1, fontFamily: "'DM Sans',sans-serif" }} placeholder="Ask about drop-offs, rage clicks, UX improvements…" value={chatInput} onChange={(e) => setChatInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && !e.shiftKey && send()} />
                                    <button style={{ ...btn(), padding: "11px 18px", flexShrink: 0 }} onClick={send} disabled={chatLoading}>Send →</button>
                                </div>
                            </div>
                        )}

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
